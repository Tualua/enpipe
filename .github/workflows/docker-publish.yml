# Build & Publish (GHCR slim runtime image)
#
# NOTE (mirrors ci.yml / hardware-integration.yml honesty): this job runs on
# hosted ubuntu-latest, which has NO Intel Arc GPU. A GREEN run here proves
# ONLY that the slim runtime image (root `Dockerfile`) BUILDS and PUSHES to
# GHCR successfully -- it does NOT validate real QSV/qsvencc/Arc-hardware
# encode behavior. That validation is the job of hardware-integration.yml
# (self-hosted Arc runner, manual dispatch only) and the local
# `docker run --device /dev/dri ...` smoke test documented in docker/README.md.
name: Build & Publish (GHCR slim runtime image)

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-push:
    name: "docker-publish / build & push ghcr.io/${{ github.repository }}"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Log in to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0 # v4.4.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata (tags/labels)
        id: meta
        uses: docker/metadata-action@dc802804100637a589fabce1cb79ff13a1411302 # v6.2.0
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha

      - name: Build and push slim runtime image
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          # qsvencc/Intel Arc media stack in this Dockerfile are amd64-only
          # (no arm64 .deb/musl builds published upstream) -- single platform.
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          secrets: |
            github_token=${{ secrets.GITHUB_TOKEN }}
